<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenParty - Configuracoes</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        padding: 32px;
        max-width: 520px;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 14px;
        color: #1a1a1a;
        background: #fff;
      }

      h1 {
        font-size: 20px;
        font-weight: 700;
        color: #7c3aed;
        margin-bottom: 24px;
      }

      .campo {
        margin-bottom: 16px;
      }

      label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: #6b7280;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 4px;
      }

      input[type="text"],
      input[type="url"] {
        width: 100%;
        padding: 9px 12px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 14px;
        outline: none;
        transition: border-color 0.15s;
      }

      input:focus {
        border-color: #7c3aed;
      }

      .dica {
        margin-top: 4px;
        font-size: 12px;
        color: #9ca3af;
      }

      button[type="submit"] {
        margin-top: 8px;
        padding: 10px 20px;
        background: #7c3aed;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s, opacity 0.15s;
      }

      button[type="submit"]:hover:not(:disabled) {
        background: #6d28d9;
      }

      button[type="submit"]:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .feedback {
        display: none;
        margin-top: 12px;
        padding: 10px 14px;
        border-radius: 6px;
        font-size: 13px;
      }

      .feedback.sucesso {
        background: #d1fae5;
        color: #065f46;
      }

      .feedback.erro {
        background: #fee2e2;
        color: #991b1b;
      }
    </style>
  </head>
  <body>
    <h1>Configuracoes - OpenParty</h1>

    <form id="form-opcoes" novalidate>
      <div class="campo">
        <label for="input-server-url">URL do servidor WebSocket</label>
        <input
          id="input-server-url"
          type="url"
          placeholder="wss://openparty.app/ws"
          autocomplete="off"
          spellcheck="false"
        />
        <p class="dica">Use wss:// para producao ou ws://localhost:... para desenvolvimento local.</p>
      </div>

      <div class="campo">
        <label for="input-display-name">Nome de exibicao</label>
        <input
          id="input-display-name"
          type="text"
          placeholder="Seu nome na sala"
          maxlength="32"
          autocomplete="name"
        />
      </div>

      <div class="campo">
        <label for="input-avatar">Avatar (emoji)</label>
        <input
          id="input-avatar"
          type="text"
          placeholder="🎬"
          maxlength="8"
        />
        <p class="dica">Um emoji que representa voce na sala.</p>
      </div>

      <button id="btn-salvar" type="submit">Salvar configuracoes</button>
    </form>

    <div id="feedback" class="feedback" role="alert" aria-live="polite"></div>

    <script type="module" src="./options.ts"></script>
  </body>
</html>

name: CI

on:
  push:
    branches:
      - main
      - "feat/**"
  pull_request:
    branches:
      - main
      - "feat/**"

jobs:
  ci:
    name: Typecheck, Build e Testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configura pnpm
        uses: pnpm/action-setup@v4

      - name: Configura Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Configura Bun
        uses: oven-sh/setup-bun@v2

      - name: Instala dependencias
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Testes
        run: bunx vitest run
